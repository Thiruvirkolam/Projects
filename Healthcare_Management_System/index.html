<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthcare Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            Healthcare System
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="patients.html">Patients</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="doctors.html">Doctors</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="appointments.html">Appointments</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

    <div class="container mt-5">

        <h2>Clinic Dashboard</h2>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5>Total Patients</h5>
                        <p id="patientCount" class="fw-bold"></p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5>Total Doctors</h5>
                        <p id="doctorCount" class="fw-bold"></p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5>Total Appointments</h5>
                        <p id="appointmentCount" class="fw-bold"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    <script>
        $(document).ready(function () {
            $("#patientCount").text(patients.length)
            $("#doctorCount").text(doctors.length)
            $("#appointmentCount").text(appointments.length)
        })
    </script>
</body>
</html>
