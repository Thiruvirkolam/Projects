<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctors</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                Healthcare System
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="patients.html">Patients</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="doctors.html">Doctors</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="appointments.html">Appointments</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Doctors</h3>
        <button class="btn btn-success mb-3"
                data-bs-toggle="modal"
                data-bs-target="#doctorModal">
            Add Doctor
        </button>

        <table class="table table-bordered">
            <thead class="table-danger">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Specialization</th>
                <th>Available Time</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="doctorTable"></tbody>
        </table>

    </div>

    <div class="modal fade" id="doctorModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Add Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text"
                        id="docName"
                        class="form-control mb-2"
                        placeholder="Doctor Name">

                    <select id="specialization" class="form-control mb-2"></select>
                    <select id="slot" class="form-control">
                        <option value="">Select Available Time</option>

                        <option>09:00 - 11:00</option>
                        <option>11:00 - 01:00</option>
                        <option>02:00 - 04:00</option>
                        <option>04:00 - 06:00</option>
                        <option>06:00 - 08:00</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Close
                    </button>

                    <button class="btn btn-primary"
                            id="saveDoctor">
                        Save
                    </button>
                </div>
                
            </div>
        </div>
    </div>

            <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
            <script src="js/data.js"></script>
            <script src="js/doctors.js"></script>
</body>
</html>
