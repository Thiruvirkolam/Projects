<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Healthcare System</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="patients.html">Patients</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="doctors.html">Doctors</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="appointments.html">Appointments</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="mb-4">Appointment Management</h2>

        <div class="d-flex justify-content-between mb-3">

            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#appointmentModal">
                Book Appointment
            </button>
            <div class="d-flex gap-2">
                <input type="date" id="filterDate" class="form-control">
                <select id="filterStatus" class="form-control">
                    <option value="">All Status</option>
                    <option value="Booked">Booked</option>
                    <option value="Completed">Completed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>

        </div>
    </div>

    <table class="table table-bordered" id="appointmentTable">
        <thead class="table-warning">
            <tr>
                <th>Appointment ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Time Slot</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <div class="modal fade" id="appointmentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                
                <div class="modal-header">
                    <h5 class="modal-title">Book Appointment</h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <select id="patient" class="form-control mb-3">
                        <option value="">Select Patient</option>
                    </select>

                    <select id="doctor" class="form-control mb-3">
                        <option value="">Select Doctor</option>
                    </select>

                    <input type="date" id="date" class="form-control mb-3">
                    <select id="time" class="form-control mb-3">
                        <option value="">Select Time Slot</option>
                    </select>

                    <button id="bookAppointment" class="btn btn-success w-100">
                        Book Appointment
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/appointments.js"></script>
</body>
</html>
